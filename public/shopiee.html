    <script>
        // Mobile menu toggle
        document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });

        function orderNow() {
            var itemName = prompt("Enter the name of the item:");
            if (itemName) {
                var quantity = parseInt(prompt("Enter the quantity:"));
                if (quantity) {
                    var address = prompt("Enter your address:");
                    if (address) {
                        var totalCost = calculateTotalCost(itemName, quantity);
                        alert("Your order for " + quantity + " " + itemName + "(s) has been placed. Total cost: $" + totalCost + ". Your order will be delivered to: " + address);
                    }
                }
            }
        }

        function calculateTotalCost(itemName, quantity) {

            return pricePerItem * quantity;
        }
