<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign-in / Sign-up - Shopiee</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <style>
            :root {
                --primary: #00bfff;
                --secondary: #ff0000;
                --dark: #000000;
                --light: #ffffff;
                --gray: #423e3e;
            }
            
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            
            .signbody {
                background-color: var(--dark);
                color: var(--light);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            
            .form-container {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 30px;
                width: 100%;
                max-width: 1000px;
            }
            
            .form {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
                width: 100%;
                max-width: 400px;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
            
            .form h2 {
                color: var(--primary);
                margin-bottom: 25px;
                text-align: center;
                font-size: 28px;
            }
            
            .form input {
                width: 100%;
                padding: 12px 15px;
                margin-bottom: 15px;
                border: 1px solid var(--gray);
                border-radius: 5px;
                background-color: rgba(0, 0, 0, 0.5);
                color: var(--light);
                font-size: 16px;
                transition: all 0.3s;
            }
            
            .form input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 2px rgba(0, 191, 255, 0.3);
            }
            
            .form input::placeholder {
                color: #aaa;
            }
            
            .form button {
                width: 100%;
                padding: 12px;
                background-color: var(--primary);
                color: var(--light);
                border: none;
                border-radius: 5px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
                margin-top: 10px;
            }
            
            .form button:hover {
                background-color: #0099cc;
            }
            
            .alert {
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 15px 25px;
                border-radius: 5px;
                color: white;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                font-weight: 500;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            
            .alert.error {
                background-color: var(--secondary);
            }
            
            .alert.success {
                background-color: #00C851;
            }
            
            @keyframes slideIn {
                from { top: -50px; opacity: 0; }
                to { top: 20px; opacity: 1; }
            }
            
            button:disabled {
                opacity: 0.7;
                cursor: not-allowed;
                background-color: #555 !important;
            }
            
            .toggle-forms {
                text-align: center;
                margin-top: 20px;
                color: #aaa;
            }
            
            .toggle-forms a {
                color: var(--primary);
                text-decoration: none;
                font-weight: 500;
            }
            
            .toggle-forms a:hover {
                text-decoration: underline;
            }
            
            .password-container {
                position: relative;
            }
            
            .password-toggle {
                position: absolute;
                right: 10px;
                top: 12px;
                color: #aaa;
                cursor: pointer;
            }
            
            @media (max-width: 768px) {
                .form-container {
                    flex-direction: column;
                    align-items: center;
                }
                
                .form {
                    max-width: 100%;
                }
            }
            
            @media (max-width: 480px) {
                .form {
                    padding: 20px;
                }
                
                .form h2 {
                    font-size: 24px;
                }
                
                .form input, .form button {
                    padding: 10px 12px;
                }
            }
        </style>
    </head>
<body class="signbody">
    <div class="form-container">
        <form id="signinForm" class="form">
            <h2>Sign In</h2>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <form id="signupForm" class="form">
            <h2>Sign Up</h2>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password (min 8 chars)" required>
            <button type="submit">Sign Up</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
